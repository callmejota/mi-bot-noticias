name: Actualizar Noticias Diariamente

on:
  schedule:
    - cron: '0 12 * * *' # Esto corre todos los días a las 12:00 UTC (ajustalo a tu gusto)
  workflow_dispatch: # Esto te permite darle al botón "Play" manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: |
          pip install requests supabase

      - name: Ejecutar Scraper
        env: # <--- ESTO ES LO QUE IMPORTA
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py