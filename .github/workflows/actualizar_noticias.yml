name: Actualizar Noticias Diariamente

on:
  schedule:
    # 7:00 AM Japón (22:00 UTC)
    - cron: '0 22 * * *'
    # 13:00 PM Japón (04:00 UTC)
    - cron: '0 4 * * *'
    # 18:00 PM Japón (09:00 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch: # Esto te permite darle al botón "Run workflow" cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install requests supabase

      - name: Ejecutar Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py